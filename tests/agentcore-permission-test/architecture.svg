<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="microvm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e2e8f4"/>
    </linearGradient>
    <linearGradient id="vpc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fff4"/>
      <stop offset="100%" stop-color="#dcf5e4"/>
    </linearGradient>
    <linearGradient id="wazuh-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="agent-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="manager-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fde8e8"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">AgentCore Runtime + Wazuh Security Monitoring Architecture</text>

  <!-- ========== LEFT: AgentCore Runtime (microVM) ========== -->
  <rect x="30" y="56" width="540" height="460" rx="10" fill="url(#microvm-bg)" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="82" font-size="13" font-weight="600" fill="#475569">AgentCore Runtime (microVM, per-user)</text>

  <!-- Container dashed box -->
  <rect x="50" y="96" width="500" height="404" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="70" y="118" font-size="12" font-weight="600" fill="#64748b">Container (root)</text>

  <!-- Wazuh Agent Section -->
  <rect x="70" y="132" width="460" height="170" rx="8" fill="url(#wazuh-bg)" stroke="#ea580c" stroke-width="1.5"/>

  <!-- Wazuh badge -->
  <circle cx="100" cy="162" r="16" fill="#ea580c"/>
  <text x="100" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="white">W</text>
  <text x="124" y="162" font-size="14" font-weight="700" fill="#9a3412">Wazuh Agent (root)</text>
  <text x="124" y="180" font-size="11" fill="#9a3412">v4.14.4 | 5 daemons | +0.4 GB overhead</text>

  <!-- Wazuh feature boxes -->
  <rect x="90" y="196" width="200" height="30" rx="5" fill="white" stroke="#fdba74" stroke-width="1"/>
  <text x="100" y="216" font-size="12" fill="#9a3412">FIM (inotify realtime)</text>

  <rect x="300" y="196" width="210" height="30" rx="5" fill="white" stroke="#fdba74" stroke-width="1"/>
  <text x="310" y="216" font-size="12" fill="#9a3412">Process monitoring (/proc)</text>

  <rect x="90" y="234" width="200" height="30" rx="5" fill="white" stroke="#fdba74" stroke-width="1"/>
  <text x="100" y="254" font-size="12" fill="#9a3412">Rootkit detection</text>

  <rect x="300" y="234" width="210" height="30" rx="5" fill="white" stroke="#fdba74" stroke-width="1"/>
  <text x="310" y="254" font-size="12" fill="#9a3412">SCA compliance scan</text>

  <rect x="90" y="272" width="420" height="22" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="300" y="287" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Log collector: /app/app.log + /var/log/syslog</text>

  <!-- AI Agent Section -->
  <rect x="70" y="320" width="460" height="164" rx="8" fill="url(#agent-bg)" stroke="#2563eb" stroke-width="1.5"/>

  <!-- AI badge -->
  <circle cx="100" cy="350" r="16" fill="#2563eb"/>
  <text x="100" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="white">AI</text>
  <text x="124" y="350" font-size="14" font-weight="700" fill="#1e40af">AI Agent (non-root: agentuser)</text>
  <text x="124" y="368" font-size="11" fill="#1e3a8a">Business logic | ~1.5 GB base memory | CPU &lt;1%</text>

  <!-- AI feature boxes -->
  <rect x="90" y="384" width="420" height="28" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="403" font-size="12" fill="#1e3a8a">LLM API calls (Bedrock / external models)</text>

  <rect x="90" y="418" width="420" height="28" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="437" font-size="12" fill="#1e3a8a">File operations (/app) - monitored by FIM</text>

  <!-- Lock bar -->
  <rect x="90" y="454" width="420" height="22" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="300" y="469" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">/var/ossec chmod 750: agentuser CANNOT tamper with Wazuh</text>

  <!-- ========== CONNECTION ARROWS ========== -->
  <!-- TCP 1514 -->
  <line x1="530" y1="218" x2="636" y2="218" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <rect x="550" y="203" width="72" height="20" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="586" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412">TCP 1514</text>
  <text x="586" y="232" text-anchor="middle" font-size="9" fill="#9a3412">events</text>

  <!-- TCP 1515 -->
  <line x1="530" y1="264" x2="636" y2="264" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <rect x="550" y="249" width="72" height="20" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="586" y="263" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412">TCP 1515</text>
  <text x="586" y="278" text-anchor="middle" font-size="9" fill="#9a3412">registration</text>

  <!-- ========== RIGHT: VPC ========== -->
  <rect x="620" y="56" width="310" height="460" rx="10" fill="url(#vpc-bg)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="82" font-size="13" font-weight="600" fill="#166534">VPC</text>

  <!-- Wazuh Manager box -->
  <rect x="640" y="132" width="270" height="264" rx="8" fill="url(#manager-bg)" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Manager badge -->
  <circle cx="670" cy="162" r="16" fill="#dc2626"/>
  <text x="670" y="167" text-anchor="middle" font-size="12" font-weight="700" fill="white">M</text>
  <text x="694" y="162" font-size="14" font-weight="700" fill="#991b1b">Wazuh Manager (EC2)</text>
  <text x="694" y="180" font-size="11" fill="#7f1d1d">Centralized security management</text>

  <!-- Manager features -->
  <rect x="660" y="198" width="230" height="30" rx="5" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="670" y="218" font-size="12" fill="#991b1b">Rule engine (decode + correlate)</text>

  <rect x="660" y="236" width="230" height="30" rx="5" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="670" y="256" font-size="12" fill="#991b1b">Alert logs (JSON / alerts.json)</text>

  <rect x="660" y="274" width="230" height="30" rx="5" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="670" y="294" font-size="12" fill="#991b1b">Dashboard (Kibana / Wazuh UI)</text>

  <rect x="660" y="312" width="230" height="30" rx="5" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="670" y="332" font-size="12" fill="#991b1b">Agent registration (authd)</text>

  <rect x="660" y="350" width="230" height="30" rx="5" fill="white" stroke="#fca5a5" stroke-width="1"/>
  <text x="670" y="370" font-size="12" fill="#991b1b">Active response (auto-remediate)</text>

  <!-- ========== Cost Box ========== -->
  <rect x="640" y="414" width="270" height="90" rx="8" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="660" y="436" font-size="12" font-weight="700" fill="#5b21b6">Measured Cost (2026-03-31)</text>
  <line x1="660" y1="442" x2="890" y2="442" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="458" font-size="11" fill="#5b21b6">Agent + Wazuh: ~1.76 GB, ~1.3% CPU</text>
  <text x="660" y="474" font-size="11" fill="#5b21b6">Cost: $0.019/hr ($0.004 Wazuh overhead)</text>
  <text x="660" y="490" font-size="11" fill="#5b21b6">Idle timeout: 15 min | CW delay: 15-35 min</text>

  <!-- ========== Bottom Bar ========== -->
  <text x="480" y="530" text-anchor="middle" font-size="10" fill="#94a3b8">AgentCore Runtime Security Monitoring PoC | Wazuh v4.14.4 | Consumption-based billing ($0.0895/vCPU-hr + $0.00945/GB-hr)</text>
</svg>
